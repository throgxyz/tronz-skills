name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, 1.85.0]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler ripgrep
      - name: Validate skill and scaffold
        run: ./scripts/validate.sh
